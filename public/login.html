<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar Sesion</title>
  <link href="/output.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
      border-radius: 20px;
      padding: 2.5rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
      border: 1px solid #86efac;
    }
    .auth-header { text-align:center;margin-bottom:2rem; }
    .auth-icon { width:60px;height:60px;background:linear-gradient(135deg,#047857,#059669);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1rem; }
    .auth-title { font-size:1.6rem;font-weight:800;color:#1e293b;letter-spacing:-0.02em;margin-bottom:0.3rem; }
    .auth-subtitle { font-size:0.88rem;color:#64748b; }
    .form-group { margin-bottom:1.1rem; }
    .form-label { display:block;font-size:0.83rem;font-weight:600;color:#374151;margin-bottom:0.4rem; }
    .form-input {
      width:100%;padding:0.72rem 1rem;border-radius:10px;
      border:1.5px solid #e2e8f0;font-size:0.93rem;
      font-family:"Inter",sans-serif;color:#1e293b;
      background:#f8fafc;transition:border-color 0.18s,box-shadow 0.18s;outline:none;
    }
    .form-input:focus { border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.12);background:white; }
    .btn-submit {
      width:100%;padding:0.85rem;border-radius:10px;border:none;
      background:linear-gradient(135deg,#047857,#059669);
      color:white;font-weight:700;font-size:1rem;
      font-family:"Inter",sans-serif;cursor:pointer;
      transition:all 0.2s;box-shadow:0 4px 14px rgba(99,102,241,0.3);
      margin-top:0.5rem;
    }
    .btn-submit:hover { transform:translateY(-1px);box-shadow:0 6px 20px rgba(4,120,87,0.4); }
    .auth-footer { text-align:center;margin-top:1.5rem;font-size:0.85rem;color:#64748b; }
    .auth-footer a { color:#047857;font-weight:600;text-decoration:none; }
    .auth-footer a:hover { color:#065f46;text-decoration:underline; }
    .divider { display:flex;align-items:center;gap:0.75rem;margin:1.5rem 0; }
    .divider-line { flex:1;height:1px;background:#e2e8f0; }
    .divider-text { font-size:0.78rem;color:#94a3b8;font-weight:500; }
    .whatsapp-btn {
      position:fixed;bottom:24px;right:24px;
      background:linear-gradient(135deg,#ef4444,#dc2626);color:white;
      border-radius:50px;padding:0.9rem 1.4rem;
      box-shadow:0 6px 24px rgba(239,68,68,0.4);
      font-weight:700;text-decoration:none;display:flex;align-items:center;
      gap:0.6rem;transition:all 0.2s;z-index:1000;font-size:0.9rem;
    }
    .whatsapp-btn:hover { transform:translateY(-3px);box-shadow:0 10px 30px rgba(239,68,68,0.5);color:white;text-decoration:none; }
    @media(max-width:480px){ .auth-card{padding:2rem 1.25rem;border-radius:16px;} }
  </style>
</head>
<body>
  <div class="page-body">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <div class="auth-title">Bienvenido</div>
        <div class="auth-subtitle">Ingresa tus credenciales para acceder</div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input name="email" type="email" placeholder="usuario@email.com" class="form-input" required />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input name="password" type="password" placeholder="••••••••" class="form-input" required />
        </div>
        <button type="submit" class="btn-submit">Iniciar sesión →</button>
      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">¿No tienes cuenta?</span>
        <div class="divider-line"></div>
      </div>

      <div class="auth-footer">
        <a href="/register.html">Crear una cuenta nueva</a>
      </div>
    </div>
  </div>

  <a href="https://wa.me/595983159658?text=Hola,%20necesito%20ayuda%20para%20Iniciar%20Sesión."
     class="whatsapp-btn" target="_blank" title="Soporte WhatsApp">
    <span>❓</span><span>¿Necesitas Ayuda?</span>
  </a>

  <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const body = Object.fromEntries(fd.entries());
      const res = await fetch("/api/auth/login", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body)
      });
      const json = await res.json();
      if (res.ok && json.token) {
        localStorage.setItem("token", json.token);
        alert("¡Bienvenido! Inicio de sesión exitoso.");
        window.location.href = "/dashboard.html";
      } else {
        alert(json.message || "Error al iniciar sesión");
      }
    });
  </script>
</body>
</html>
