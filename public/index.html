<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/output.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .welcome-card {
      background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
      border: 1px solid #86efac;
      text-align: center;
    }
    .welcome-header { margin-bottom: 2rem; }
    .welcome-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #047857, #059669);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }
    .welcome-title {
      font-size: 2rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .welcome-subtitle {
      font-size: 1.1rem;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .welcome-description {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .welcome-cta {
      font-size: 0.95rem;
      color: #475569;
      font-weight: 500;
      margin-bottom: 2rem;
    }
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .btn {
      padding: 0.95rem 1.5rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #047857, #059669);
      color: white;
      box-shadow: 0 4px 14px rgba(4, 120, 87, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(4, 120, 87, 0.4);
      text-decoration: none;
      color: white;
    }
    .btn-secondary {
      background: white;
      color: #047857;
      border: 2px solid #047857;
      box-shadow: 0 2px 8px rgba(4, 120, 87, 0.1);
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      background: #ecfdf5;
      box-shadow: 0 4px 12px rgba(4, 120, 87, 0.2);
      text-decoration: none;
      color: #6366f1;
    }
    .whatsapp-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border-radius: 50px;
      padding: 0.9rem 1.4rem;
      box-shadow: 0 6px 24px rgba(239, 68, 68, 0.4);
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.2s;
      z-index: 1000;
      font-size: 0.9rem;
    }
    .whatsapp-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
      color: white;
      text-decoration: none;
    }
    @media (max-width: 540px) {
      .button-group { grid-template-columns: 1fr; }
      .welcome-card { padding: 2rem 1.5rem; border-radius: 16px; }
      .welcome-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="page-body">
    <div class="welcome-card">
      <div class="welcome-header">
        <div class="welcome-icon">👋</div>
        <div class="welcome-title">Bienvenido</div>
        <div class="welcome-subtitle">MUNICIPALIDAD DE BENJAMIN ACEVAL</div>
        <div class="welcome-description">JUNTOS PODEMOS HACER LA DIFERENCIA</div>
      </div>

      <div class="welcome-cta">
        <p>Accede a tu usuario o crea tu cuenta para comenzar.</p>
      </div>

      <div class="button-group">
        <a href="/register.html" class="btn btn-primary">
          <span>➕</span>
          <span>Crear cuenta</span>
        </a>
        <a href="/login.html" class="btn btn-secondary">
          <span>🔐</span>
          <span>Iniciar sesión</span>
        </a>
      </div>
    </div>
  </div>

  <a href="https://wa.me/595983159658?text=Hola,%20necesito%20ayuda%20para%20acceder%20al%20sistema"
     class="whatsapp-btn" target="_blank" title="Soporte WhatsApp">
    <span>❓</span><span>¿Necesitas Ayuda?</span>
  </a>
</body>
</html>
